<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Body Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5087/5087847.png">
    
    <!-- CDNリソースの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12 overflow-x-hidden">

    <header class="bg-indigo-600 text-white py-4 px-6 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            ⚖️ Body Tracker
        </h1>
        <span id="pyodide-status" class="text-xs bg-indigo-800 px-2.5 py-1 rounded-full text-indigo-200 font-medium">
            Python 起動中...
        </span>
    </header>

    <!-- max-w-md でスマホ幅を基準にしつつ、PCでは綺麗なカード配置を維持 -->
    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- プロフィール（基本設定） -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50">
            <h2 class="text-md font-bold mb-4 text-slate-700 flex items-center gap-2">
                <span class="text-indigo-500">⚙️</span> 基本設定
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">身長 (cm)</label>
                    <input type="number" id="profile-height" step="0.1" class="w-full bg-slate-50/50 border border-slate-200/60 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="170.0" onchange="saveProfile()">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">目標体重 (kg)</label>
                    <input type="number" id="profile-target" step="0.1" class="w-full bg-slate-50/50 border border-slate-200/60 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="60.0" onchange="saveProfile()">
                </div>
            </div>
        </section>

        <!-- 本日の入力フォーム（PC時はバッジを右側に浮かせ、スマホ時はタイトルの横に綺麗にインライン格納） -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50 relative">
            
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-md font-bold text-slate-700 flex items-center gap-2">
                    <span class="text-indigo-500">📝</span> 今日の記録
                </h2>
                
                <!-- スマホ時はここ（タイトルの横）に表示される -->
                <div class="md:hidden text-[10px] text-slate-500 bg-slate-50 border border-slate-200/80 px-2 py-1 rounded-lg font-medium shadow-sm">
                    この端末に保存済み
                </div>
            </div>

            <!-- PC画面の時だけ、カードの右側に浮かび上がるフローティングバッジ（スマホ時は hidden で非表示） -->
            <div class="hidden md:block absolute -right-40 top-1/2 -translate-y-1/2 text-xs text-slate-600 bg-white border border-slate-200/80 px-3 py-2 rounded-xl font-medium shadow-md whitespace-nowrap">
                この PC に保存済み
            </div>

            <form id="record-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 font-medium mb-1.5">体重 (kg)</label>
                        <input type="number" id="input-weight" step="0.1" required class="w-full bg-slate-50/50 border border-slate-200/60 rounded-xl px-4 py-2.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="65.0">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 font-medium mb-1.5">ウエスト (cm)</label>
                        <input type="number" id="input-waist" step="0.1" class="w-full bg-slate-50/50 border border-slate-200/60 rounded-xl px-4 py-2.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="80.0">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">日付</label>
                    <input type="date" id="input-date" required class="w-full bg-slate-50/50 border border-slate-200/60 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-2xl transition-all shadow-md active:scale-[0.98]">
                    記録を保存する
                </button>
            </form>
        </section>

        <!-- 推移グラフ (期間切り替え付き) -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50">
            <div class="flex flex-col gap-3 mb-4">
                <h2 class="text-md font-bold text-slate-700 flex items-center gap-2">
                    <span class="text-indigo-500">📈</span> 体組成推移
                </h2>
                <!-- 期間切り替えボタン（横スクロール時のガタつき防止） -->
                <div class="flex gap-1.5 overflow-x-auto pb-1 no-scrollbar">
                    <button type="button" onclick="changePeriod(7)" id="btn-7" class="px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap transition-all">7日</button>
                    <button type="button" onclick="changePeriod(30)" id="btn-30" class="px-3 py-1.5 text-xs rounded-lg bg-indigo-600 text-white font-bold whitespace-nowrap transition-all">30日</button>
                    <button type="button" onclick="changePeriod(60)" id="btn-60" class="px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap transition-all">60日</button>
                    <button type="button" onclick="changePeriod(90)" id="btn-90" class="px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap transition-all">90日</button>
                    <button type="button" onclick="changePeriod(180)" id="btn-180" class="px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap transition-all">180日</button>
                    <button type="button" onclick="changePeriod(365)" id="btn-365" class="px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap transition-all">365日</button>
                </div>
            </div>
            <div class="w-full h-56">
                <canvas id="weightChart"></canvas>
            </div>
        </section>

        <!-- Pythonによる高度な自己分析レポート -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50">
            <h2 class="text-md font-bold mb-3 text-slate-700 flex items-center gap-2">
                <span class="text-indigo-500">🤖</span> Python AI分析
            </h2>
            <div id="analysis-report" class="text-sm space-y-2 text-slate-600">
                <p class="animate-pulse text-xs text-slate-400">Pythonによる分析を待機中...</p>
            </div>
        </section>

        <!-- 端末間のデータ引越しセクション -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50">
            <h2 class="text-md font-bold mb-1 text-slate-700 flex items-center gap-2">
                <span class="text-indigo-500">📲</span> データ引越し（通信ログゼロ）
            </h2>
            <p class="text-xs text-slate-400 mb-4 leading-relaxed">
                全データをQRコード化します。別端末のカメラで読み取るだけで、ネットワークログを一切残さずにデータ移行が可能です。
            </p>
            <div class="space-y-3">
                <button type="button" onclick="generateQRCode()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-3 px-4 rounded-2xl transition-all shadow-md active:scale-[0.98]">
                    🔍 引越し用QRコードを生成する
                </button>
                
                <div id="qr-container" class="hidden flex flex-col items-center p-4 bg-slate-50 rounded-2xl border border-slate-200/60 space-y-3">
                    <div id="qrcode" class="bg-white p-4 rounded-xl shadow-sm border border-slate-100"></div>
                    <p class="text-center text-xs text-slate-500 font-bold leading-relaxed">
                        【移行方法】<br>
                        移転先の標準カメラで上記QRコードをスキャンし、表示されたURLを開いてください。
                    </p>
                    <button type="button" onclick="hideQR()" class="text-xs text-slate-400 underline hover:text-slate-600">QRコードを閉じる</button>
                </div>
            </div>
        </section>

        <!-- 過去の履歴 -->
        <section class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100/50">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-md font-bold text-slate-700 flex items-center gap-2">
                    <span class="text-indigo-500">📋</span> 過去の履歴
                </h2>
                <button type="button" onclick="clearAllData()" class="text-xs text-rose-500 hover:underline font-semibold">データを全消去</button>
            </div>
            <div class="max-h-60 overflow-y-auto border border-slate-100 rounded-2xl">
                <table class="w-full text-sm text-left text-slate-500">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-50 sticky top-0">
                        <tr>
                            <th class="px-4 py-3">日付</th>
                            <th class="px-4 py-3">体重</th>
                            <th class="px-4 py-3">腹囲</th>
                            <th class="px-4 py-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="history-table">
                        <!-- 動的に挿入 -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        let pyodideInstance = null;
        let chartInstance = null;
        let selectedPeriod = 30;

        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            checkURLAndImport();
            loadProfile();
            renderTableAndChart();
            await initPyodide();
        });

        function checkURLAndImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const importData = urlParams.get('data');

            if (importData) {
                try {
                    const decodedData = decodeURIComponent(atob(importData));
                    const payload = JSON.parse(decodedData);

                    if (payload.records && Array.isArray(payload.records)) {
                        if (confirm(`【データ引き継ぎの検出】\nQRコードから読み取ったデータ（履歴: ${payload.records.length}件）を、この端末に引き継ぎますか？\n（※既存のデータはすべて上書きされます）`)) {
                            localStorage.setItem('wt_records', JSON.stringify(payload.records));
                            if (payload.profile) {
                                localStorage.setItem('wt_profile', JSON.stringify(payload.profile));
                            }
                            alert("引き継ぎが成功しました！過去の履歴が復元されました。");
                        }
                    }
                } catch (e) {
                    alert("QRデータのデコードに失敗しました。");
                    console.error(e);
                }

                const cleanURL = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({ path: cleanURL }, '', cleanURL);
            }
        }

        function generateQRCode() {
            const records = localStorage.getItem('wt_records') || '[]';
            const profile = localStorage.getItem('wt_profile') || '{}';

            const payload = {
                records: JSON.parse(records),
                profile: JSON.parse(profile)
            };

            try {
                const jsonStr = JSON.stringify(payload);
                const base64Data = btoa(encodeURIComponent(jsonStr));
                const shareURL = window.location.protocol + "//" + window.location.host + window.location.pathname + "?data=" + base64Data;

                const qrDiv = document.getElementById('qrcode');
                qrDiv.innerHTML = "";
                document.getElementById('qr-container').classList.remove('hidden');

                new QRCode(qrDiv, {
                    text: shareURL,
                    width: 256,
                    height: 256,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });

                document.getElementById('qr-container').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert("データの容量が大きすぎるためQRコードに変換できませんでした。");
                console.error(error);
            }
        }

        function hideQR() {
            document.getElementById('qr-container').classList.add('hidden');
        }

        function changePeriod(days) {
            selectedPeriod = days;
            const periods = [7, 30, 60, 90, 180, 365];
            periods.forEach(p => {
                const btn = document.getElementById(`btn-${p}`);
                if (p === days) {
                    btn.className = "px-3 py-1.5 text-xs rounded-lg bg-indigo-600 text-white font-bold whitespace-nowrap transition-all";
                } else {
                    btn.className = "px-3 py-1.5 text-xs rounded-lg bg-slate-100 text-slate-600 font-bold whitespace-nowrap hover:bg-slate-200 transition-all";
                }
            });
            renderTableAndChart();
        }

        async function initPyodide() {
            try {
                pyodideInstance = await loadPyodide();
                const response = await fetch('main.py');
                const pythonCode = await response.text();
                pyodideInstance.runPython(pythonCode);
                
                document.getElementById('pyodide-status').innerText = "Python 起動完了";
                document.getElementById('pyodide-status').classList.replace('bg-indigo-800', 'bg-emerald-600');
                
                runPythonAnalysis();
            } catch (error) {
                console.error("Pyodideのロード失敗:", error);
                document.getElementById('pyodide-status').innerText = "Python エラー";
                document.getElementById('pyodide-status').classList.replace('bg-indigo-800', 'bg-rose-600');
            }
        }

        function saveProfile() {
            const height = document.getElementById('profile-height').value;
            const target = document.getElementById('profile-target').value;
            localStorage.setItem('wt_profile', JSON.stringify({ height, target }));
            runPythonAnalysis();
        }

        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('wt_profile') || '{}');
            if (profile.height) document.getElementById('profile-height').value = profile.height;
            if (profile.target) document.getElementById('profile-target').value = profile.target;
        }

        document.getElementById('record-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = document.getElementById('input-date').value;
            const weight = parseFloat(document.getElementById('input-weight').value);
            const waist = parseFloat(document.getElementById('input-waist').value) || null;

            if (!date || isNaN(weight)) return;

            let records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            
            const existingIndex = records.findIndex(r => r.date === date);
            if (existingIndex > -1) {
                records[existingIndex] = { date, weight, waist };
            } else {
                records.push({ date, weight, waist });
            }

            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('wt_records', JSON.stringify(records));

            document.getElementById('input-weight').value = '';
            document.getElementById('input-waist').value = '';
            renderTableAndChart();
            runPythonAnalysis();
        });

        function deleteRecord(date) {
            if (!confirm(`${date} の記録を削除しますか？`)) return;
            let records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            records = records.filter(r => r.date !== date);
            localStorage.setItem('wt_records', JSON.stringify(records));
            renderTableAndChart();
            runPythonAnalysis();
        }

        function clearAllData() {
            if (!confirm("本当に全てのデータを削除しますか？")) return;
            localStorage.removeItem('wt_records');
            renderTableAndChart();
            runPythonAnalysis();
        }

        function renderTableAndChart() {
            const records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            
            const tableBody = document.getElementById('history-table');
            tableBody.innerHTML = '';
            [...records].reverse().forEach(r => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50/80";
                tr.innerHTML = `
                    <td class="px-4 py-3 font-semibold text-slate-700">${r.date}</td>
                    <td class="px-4 py-3 font-medium text-slate-800">${r.weight} kg</td>
                    <td class="px-4 py-3 font-medium text-slate-800">${r.waist ? r.waist + ' cm' : '-'}</td>
                    <td class="px-4 py-3">
                        <button type="button" onclick="deleteRecord('${r.date}')" class="text-rose-500 hover:underline font-semibold">削除</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            const recentRecords = records.slice(-selectedPeriod);
            const labels = recentRecords.map(r => r.date.substring(5));
            const weights = recentRecords.map(r => r.weight);
            const waists = recentRecords.map(r => r.waist);

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('weightChart').getContext('2d');
            
            // 2軸グラフの設定 (体重:左軸, ウエスト:右軸)
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '体重 (kg)',
                            data: weights,
                            borderColor: 'rgb(79, 70, 229)',
                            backgroundColor: 'rgba(79, 70, 229, 0.05)',
                            yAxisID: 'y-weight', // 左軸を参照
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'ウエスト (cm)',
                            data: waists,
                            borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.05)',
                            yAxisID: 'y-waist', // 右軸を参照
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        'y-weight': {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: '体重 (kg)', color: 'rgb(79, 70, 229)', font: { weight: 'bold' } },
                            grid: { drawOnChartArea: true }
                        },
                        'y-waist': {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: 'ウエスト (cm)', color: 'rgb(16, 185, 129)', font: { weight: 'bold' } },
                            grid: { drawOnChartArea: false } // 目盛り線が重なって汚くなるのを防ぐため、右軸のグリッド線は非表示
                        }
                    }
                }
            });
        }

        async function runPythonAnalysis() {
            if (!pyodideInstance) return;

            const records = localStorage.getItem('wt_records') || '[]';
            const profile = localStorage.getItem('wt_profile') || '{}';

            pyodideInstance.globals.set("records_json", records);
            pyodideInstance.globals.set("profile_json", profile);

            try {
                const htmlReport = await pyodideInstance.runPython("analyze_data(records_json, profile_json)");
                document.getElementById('analysis-report').innerHTML = htmlReport;
            } catch (error) {
                console.error("Pythonの解析実行に失敗:", error);
                document.getElementById('analysis-report').innerHTML = `<p class="text-rose-500">分析エンジンの実行中にエラーが発生しました。</p>`;
            }
        }
    </script>
</body>
</html>
