<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Body Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5087/5087847.png">
    
    <!-- CDNリソースの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <header class="bg-indigo-600 text-white py-4 px-6 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            ⚖️ Body Tracker
        </h1>
        <span id="pyodide-status" class="text-xs bg-indigo-800 px-2 py-1 rounded text-indigo-200">
            Python 起動中...
        </span>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- プロフィール（基本設定） -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-md font-bold mb-3 text-slate-700 flex items-center gap-1">⚙️ 基本設定</h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">身長 (cm)</label>
                    <input type="number" id="profile-height" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500" placeholder="170.0" onchange="saveProfile()">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">目標体重 (kg)</label>
                    <input type="number" id="profile-target" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500" placeholder="60.0" onchange="saveProfile()">
                </div>
            </div>
        </section>

        <!-- 本日の入力フォーム -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-md font-bold mb-3 text-slate-700 flex items-center gap-1">📝 今日の記録</h2>
            <form id="record-form" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">体重 (kg)</label>
                        <input type="number" id="input-weight" step="0.1" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-md font-semibold focus:outline-indigo-500" placeholder="65.0">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">ウエスト (cm)</label>
                        <input type="number" id="input-waist" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-md font-semibold focus:outline-indigo-500" placeholder="80.0">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">日付</label>
                    <input type="date" id="input-date" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition shadow-sm">
                    記録を保存する
                </button>
            </form>
        </section>

        <!-- 推移グラフ (期間切り替え付き) -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-col gap-2 mb-3">
                <h2 class="text-md font-bold text-slate-700">📈 体組成推移</h2>
                <!-- 期間切り替えボタン（スマホでもはみ出ないように横スクロール対応） -->
                <div class="flex gap-1 overflow-x-auto pb-1 no-scrollbar">
                    <button type="button" onclick="changePeriod(7)" id="btn-7" class="px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">7日</button>
                    <button type="button" onclick="changePeriod(30)" id="btn-30" class="px-2.5 py-1 text-xs rounded-lg bg-indigo-600 text-white font-semibold whitespace-nowrap">30日</button>
                    <button type="button" onclick="changePeriod(60)" id="btn-60" class="px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">60日</button>
                    <button type="button" onclick="changePeriod(90)" id="btn-90" class="px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">90日</button>
                    <button type="button" onclick="changePeriod(180)" id="btn-180" class="px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">180日</button>
                    <button type="button" onclick="changePeriod(365)" id="btn-365" class="px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">365日</button>
                </div>
            </div>
            <div class="w-full h-56">
                <canvas id="weightChart"></canvas>
            </div>
        </section>

        <!-- Pythonによる高度な自己分析レポート -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-md font-bold mb-3 text-slate-700 flex items-center gap-1">🤖 Python AI分析</h2>
            <div id="analysis-report" class="text-sm space-y-2 text-slate-600">
                <p class="animate-pulse">Pythonによる分析を待機中...</p>
            </div>
        </section>

        <!-- 端末間のデータ引越しセクション -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-md font-bold mb-1 text-slate-700 flex items-center gap-1">📲 端末間のデータ引越し（通信ログゼロ）</h2>
            <p class="text-xs text-slate-500 mb-3">
                この端末に保存されている全てのデータをQRコードに変換します。新しい端末（スマホやPC）のカメラでこのQRコードを読み取るだけで、インターネット通信を一切行わずにデータを一瞬で引き継ぐことができます。
            </p>
            <div class="space-y-3">
                <button type="button" onclick="generateQRCode()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2.5 px-4 rounded-xl transition shadow-sm">
                    🔍 引越し用QRコードを生成する
                </button>
                
                <div id="qr-container" class="hidden flex flex-col items-center p-4 bg-slate-100 rounded-xl border border-slate-200 space-y-3">
                    <div id="qrcode" class="bg-white p-3 rounded-lg shadow-sm"></div>
                    <p class="text-center text-xs text-slate-600 font-semibold leading-relaxed">
                        【移行方法】<br>
                        移転先スマートフォンの標準カメラ等で上記QRコードをスキャンし、表示されたURLを開いてください。
                    </p>
                    <button type="button" onclick="hideQR()" class="text-xs text-slate-500 underline">QRコードを閉じる</button>
                </div>
            </div>
        </section>

        <!-- 過去の履歴 -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-md font-bold text-slate-700">📋 過去の履歴</h2>
                <button type="button" onclick="clearAllData()" class="text-xs text-rose-500 hover:underline">データを全消去</button>
            </div>
            <div class="max-h-60 overflow-y-auto border border-slate-100 rounded-xl">
                <table class="w-full text-sm text-left text-slate-500">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-50 sticky top-0">
                        <tr>
                            <th class="px-3 py-2">日付</th>
                            <th class="px-3 py-2">体重</th>
                            <th class="px-3 py-2">腹囲</th>
                            <th class="px-3 py-2">操作</th>
                        </tr>
                    </thead>
                    <tbody id="history-table">
                        <!-- 動的に挿入 -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        let pyodideInstance = null;
        let chartInstance = null;
        let selectedPeriod = 30; // グラフのデフォルト表示日数

        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            checkURLAndImport();
            loadProfile();
            renderTableAndChart();
            await initPyodide();
        });

        // URLパラメータのチェックとインポート
        function checkURLAndImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const importData = urlParams.get('data');

            if (importData) {
                try {
                    const decodedData = decodeURIComponent(atob(importData));
                    const payload = JSON.parse(decodedData);

                    if (payload.records && Array.isArray(payload.records)) {
                        if (confirm(`【データ引き継ぎの検出】\nQRコードから読み取ったデータ（履歴: ${payload.records.length}件）を、この端末に引き継ぎますか？\n（※既存のデータはすべて上書きされます）`)) {
                            localStorage.setItem('wt_records', JSON.stringify(payload.records));
                            if (payload.profile) {
                                localStorage.setItem('wt_profile', JSON.stringify(payload.profile));
                            }
                            alert("引き継ぎが成功しました！過去の履歴が復元されました。");
                        }
                    }
                } catch (e) {
                    alert("QRデータのデコードに失敗しました。データが欠損している可能性があります。");
                    console.error(e);
                }

                const cleanURL = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({ path: cleanURL }, '', cleanURL);
            }
        }

        // 引越し用QRコード生成
        function generateQRCode() {
            const records = localStorage.getItem('wt_records') || '[]';
            const profile = localStorage.getItem('wt_profile') || '{}';

            const payload = {
                records: JSON.parse(records),
                profile: JSON.parse(profile)
            };

            try {
                const jsonStr = JSON.stringify(payload);
                const base64Data = btoa(encodeURIComponent(jsonStr));
                const shareURL = window.location.protocol + "//" + window.location.host + window.location.pathname + "?data=" + base64Data;

                const qrDiv = document.getElementById('qrcode');
                qrDiv.innerHTML = "";
                document.getElementById('qr-container').classList.remove('hidden');

                new QRCode(qrDiv, {
                    text: shareURL,
                    width: 256,
                    height: 256,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });

                document.getElementById('qr-container').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert("データの容量が大きすぎるためQRコードに変換できませんでした。");
                console.error(error);
            }
        }

        function hideQR() {
            document.getElementById('qr-container').classList.add('hidden');
        }

        // 表示期間の切り替え処理
        function changePeriod(days) {
            selectedPeriod = days;
            
            // 各種切り替えボタンの見た目の調整
            const periods = [7, 30, 60, 90, 180, 365];
            periods.forEach(p => {
                const btn = document.getElementById(`btn-${p}`);
                if (p === days) {
                    // 選択状態：インディゴ色
                    btn.className = "px-2.5 py-1 text-xs rounded-lg bg-indigo-600 text-white font-semibold whitespace-nowrap";
                } else {
                    // 未選択状態：プレーン
                    btn.className = "px-2.5 py-1 text-xs rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap hover:bg-slate-200";
                }
            });

            // グラフを再描画
            renderTableAndChart();
        }

        async function initPyodide() {
            try {
                pyodideInstance = await loadPyodide();
                const response = await fetch('main.py');
                const pythonCode = await response.text();
                pyodideInstance.runPython(pythonCode);
                
                document.getElementById('pyodide-status').innerText = "Python 起動完了";
                document.getElementById('pyodide-status').classList.replace('bg-indigo-800', 'bg-emerald-600');
                
                runPythonAnalysis();
            } catch (error) {
                console.error("Pyodideのロード失敗:", error);
                document.getElementById('pyodide-status').innerText = "Python エラー";
                document.getElementById('pyodide-status').classList.replace('bg-indigo-800', 'bg-rose-600');
            }
        }

        function saveProfile() {
            const height = document.getElementById('profile-height').value;
            const target = document.getElementById('profile-target').value;
            localStorage.setItem('wt_profile', JSON.stringify({ height, target }));
            runPythonAnalysis();
        }

        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('wt_profile') || '{}');
            if (profile.height) document.getElementById('profile-height').value = profile.height;
            if (profile.target) document.getElementById('profile-target').value = profile.target;
        }

        document.getElementById('record-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = document.getElementById('input-date').value;
            const weight = parseFloat(document.getElementById('input-weight').value);
            const waist = parseFloat(document.getElementById('input-waist').value) || null;

            if (!date || isNaN(weight)) return;

            let records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            
            const existingIndex = records.findIndex(r => r.date === date);
            if (existingIndex > -1) {
                records[existingIndex] = { date, weight, waist };
            } else {
                records.push({ date, weight, waist });
            }

            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('wt_records', JSON.stringify(records));

            document.getElementById('input-weight').value = '';
            document.getElementById('input-waist').value = '';
            renderTableAndChart();
            runPythonAnalysis();
        });

        function deleteRecord(date) {
            if (!confirm(`${date} の記録を削除しますか？`)) return;
            let records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            records = records.filter(r => r.date !== date);
            localStorage.setItem('wt_records', JSON.stringify(records));
            renderTableAndChart();
            runPythonAnalysis();
        }

        function clearAllData() {
            if (!confirm("本当に全てのデータを削除しますか？")) return;
            localStorage.removeItem('wt_records');
            renderTableAndChart();
            runPythonAnalysis();
        }

        function renderTableAndChart() {
            const records = JSON.parse(localStorage.getItem('wt_records') || '[]');
            
            // 履歴テーブルの描画
            const tableBody = document.getElementById('history-table');
            tableBody.innerHTML = '';
            [...records].reverse().forEach(r => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="px-3 py-2 font-medium text-slate-900">${r.date}</td>
                    <td class="px-3 py-2">${r.weight} kg</td>
                    <td class="px-3 py-2">${r.waist ? r.waist + ' cm' : '-'}</td>
                    <td class="px-3 py-2">
                        <button type="button" onclick="deleteRecord('${r.date}')" class="text-rose-500 hover:underline">削除</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            // 選択された表示期間（selectedPeriod）でデータを切り出す
            const recentRecords = records.slice(-selectedPeriod);
            const labels = recentRecords.map(r => r.date.substring(5));
            const weights = recentRecords.map(r => r.weight);
            const waists = recentRecords.map(r => r.waist);

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('weightChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '体重 (kg)',
                            data: weights,
                            borderColor: 'rgb(79, 70, 229)',
                            backgroundColor: 'rgba(79, 70, 229, 0.05)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'ウエスト (cm)',
                            data: waists,
                            borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.05)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            title: { display: true, text: '測定数値' }
                        }
                    }
                }
            });
        }

        async function runPythonAnalysis() {
            if (!pyodideInstance) return;

            const records = localStorage.getItem('wt_records') || '[]';
            const profile = localStorage.getItem('wt_profile') || '{}';

            pyodideInstance.globals.set("records_json", records);
            pyodideInstance.globals.set("profile_json", profile);

            try {
                const htmlReport = await pyodideInstance.runPython("analyze_data(records_json, profile_json)");
                document.getElementById('analysis-report').innerHTML = htmlReport;
            } catch (error) {
                console.error("Pythonの解析実行に失敗:", error);
                document.getElementById('analysis-report').innerHTML = `<p class="text-rose-500">分析エンジンの実行中にエラーが発生しました。</p>`;
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered!', reg))
            .catch(err => console.error('Service Worker Registration Failed', err));
        }
    </script>
</body>
</html>
